<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Layered jungle hills with floating temple chedis at dawn">
  <defs>
    <linearGradient id="dawn" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6d68a"/>
      <stop offset="40%" stop-color="#e6a872"/>
      <stop offset="100%" stop-color="#1f4d3d"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2c5a47"/>
      <stop offset="100%" stop-color="#15362b"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f4d3d"/>
      <stop offset="100%" stop-color="#0e2a22"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.62" cy="0.42" r="0.18">
      <stop offset="0%" stop-color="#f6d68a"/>
      <stop offset="60%" stop-color="#c79a3a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c79a3a" stop-opacity="0"/>
    </radialGradient>
    <filter id="g3"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.7  0 0 0 0 0.3  0 0 0 0.07 0"/></filter>
  </defs>

  <rect width="1200" height="800" fill="url(#dawn)"/>
  <circle cx="744" cy="336" r="62" fill="#f6d68a" opacity="0.85"/>
  <rect width="1200" height="800" fill="url(#sunGlow)"/>

  <!-- distant ridge -->
  <path d="M0 480 C 200 420, 380 460, 540 430 C 720 400, 880 470, 1050 440 C 1140 425, 1180 430, 1200 432 L 1200 800 L 0 800 Z" fill="#3a6b58" opacity="0.75"/>

  <!-- mid hills -->
  <path d="M0 560 C 160 500, 300 540, 460 510 C 620 480, 780 540, 940 520 C 1080 504, 1160 520, 1200 522 L 1200 800 L 0 800 Z" fill="url(#hill1)"/>

  <!-- foreground hills with chedis -->
  <path d="M0 640 C 180 580, 320 610, 480 590 C 660 570, 820 620, 980 600 C 1100 588, 1180 600, 1200 602 L 1200 800 L 0 800 Z" fill="url(#hill2)"/>

  <!-- chedi cluster on the ridge -->
  <g transform="translate(420, 480)" fill="#c79a3a" stroke="#15362b" stroke-width="1" stroke-opacity="0.4">
    <path d="M0 80 L 4 50 L 8 30 L 6 18 Q 10 10 12 4 Q 14 -2 12 -8 Q 18 -10 18 -18 Q 24 -10 30 -8 Q 28 -2 30 4 Q 32 10 36 18 L 34 30 L 38 50 L 42 80 Z"/>
  </g>
  <g transform="translate(560, 460) scale(1.3)" fill="#e6c068" stroke="#15362b" stroke-width="1" stroke-opacity="0.5">
    <path d="M0 80 L 4 50 L 8 30 L 6 18 Q 10 10 12 4 Q 14 -2 12 -8 Q 18 -10 18 -18 Q 24 -10 30 -8 Q 28 -2 30 4 Q 32 10 36 18 L 34 30 L 38 50 L 42 80 Z"/>
  </g>
  <g transform="translate(720, 470) scale(0.85)" fill="#c79a3a" stroke="#15362b" stroke-width="1" stroke-opacity="0.4">
    <path d="M0 80 L 4 50 L 8 30 L 6 18 Q 10 10 12 4 Q 14 -2 12 -8 Q 18 -10 18 -18 Q 24 -10 30 -8 Q 28 -2 30 4 Q 32 10 36 18 L 34 30 L 38 50 L 42 80 Z"/>
  </g>

  <!-- floating birds -->
  <g fill="none" stroke="#15362b" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M180 220 q 8 -8 16 0 q 8 -8 16 0"/>
    <path d="M260 200 q 6 -6 12 0 q 6 -6 12 0"/>
    <path d="M320 240 q 6 -6 12 0 q 6 -6 12 0"/>
  </g>

  <!-- foreground frond -->
  <g transform="translate(80, 760) rotate(-12)" fill="#0e2a22">
    <path d="M0 0 C 80 -30, 180 -70, 320 -100 C 200 -50, 100 -10, 0 0 Z"/>
    <g stroke="#15362b" stroke-opacity="0.7" stroke-width="1" fill="none">
      <path d="M30 -10 L 280 -90 M60 -18 L 280 -88 M90 -26 L 280 -86 M120 -34 L 280 -84 M150 -42 L 280 -82"/>
    </g>
  </g>
  <g transform="translate(1100, 770) rotate(192)" fill="#0e2a22">
    <path d="M0 0 C 80 -30, 180 -70, 320 -100 C 200 -50, 100 -10, 0 0 Z"/>
  </g>

  <rect width="1200" height="800" filter="url(#g3)" opacity="0.4"/>
</svg>
