<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Tropical Thai temple at dawn with lotus pond">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f4d3d"/>
      <stop offset="55%" stop-color="#2c5a47"/>
      <stop offset="100%" stop-color="#15362b"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e6c068"/>
      <stop offset="100%" stop-color="#a47820"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.28" r="0.35">
      <stop offset="0%" stop-color="#f6d68a" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#c79a3a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1f4d3d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="leaves" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#15362b" stroke-opacity="0.45" stroke-width="1.2">
        <path d="M40 220 C 90 150, 150 100, 220 40"/>
        <path d="M60 220 L 220 60 M80 220 L 220 80 M100 220 L 220 100 M120 220 L 220 120 M140 220 L 220 140 M160 220 L 220 160 M180 220 L 220 180" stroke-opacity="0.32"/>
      </g>
    </pattern>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.9  0 0 0 0 0.75  0 0 0 0 0.3  0 0 0 0.08 0"/></filter>
  </defs>

  <!-- jungle sky -->
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect width="1200" height="800" fill="url(#sun)"/>
  <rect width="1200" height="800" fill="url(#leaves)" opacity="0.55"/>

  <!-- distant chedi silhouettes -->
  <g opacity="0.75">
    <g transform="translate(740, 320)" fill="#0e2a22">
      <path d="M0 200 L 10 140 L 18 110 L 22 80 L 18 60 Q 22 40 26 30 Q 30 22 26 14 Q 36 12 36 0 Q 46 12 56 14 Q 52 22 56 30 Q 60 40 64 60 L 60 80 L 64 110 L 72 140 L 82 200 Z"/>
    </g>
    <g transform="translate(640, 360) scale(0.7)" fill="#0e2a22">
      <path d="M0 200 L 10 140 L 18 110 L 22 80 L 18 60 Q 22 40 26 30 Q 30 22 26 14 Q 36 12 36 0 Q 46 12 56 14 Q 52 22 56 30 Q 60 40 64 60 L 60 80 L 64 110 L 72 140 L 82 200 Z"/>
    </g>
    <g transform="translate(860, 350) scale(0.55)" fill="#0e2a22">
      <path d="M0 200 L 10 140 L 18 110 L 22 80 L 18 60 Q 22 40 26 30 Q 30 22 26 14 Q 36 12 36 0 Q 46 12 56 14 Q 52 22 56 30 Q 60 40 64 60 L 60 80 L 64 110 L 72 140 L 82 200 Z"/>
    </g>
  </g>

  <!-- mid-ground temple roof tiers (gold-leaf) -->
  <g transform="translate(420, 360)">
    <g fill="url(#goldGrad)" stroke="#2c1810" stroke-width="1.2" stroke-opacity="0.35">
      <!-- base platform -->
      <path d="M-180 230 L 180 230 L 200 270 L -200 270 Z"/>
      <!-- pillars -->
      <rect x="-140" y="120" width="14" height="110" fill="#c79a3a"/>
      <rect x="126" y="120" width="14" height="110" fill="#c79a3a"/>
      <rect x="-50" y="120" width="14" height="110" fill="#c79a3a"/>
      <rect x="36" y="120" width="14" height="110" fill="#c79a3a"/>
      <!-- lower roof -->
      <path d="M-180 120 L -160 90 L 160 90 L 180 120 Z"/>
      <!-- chofa hooks -->
      <path d="M-180 120 q -18 -8 -22 -28 q 14 6 24 18 Z"/>
      <path d="M180 120 q 18 -8 22 -28 q -14 6 -24 18 Z"/>
      <!-- middle roof -->
      <path d="M-150 90 L -130 60 L 130 60 L 150 90 Z"/>
      <path d="M-150 90 q -16 -6 -18 -22 q 12 4 22 14 Z"/>
      <path d="M150 90 q 16 -6 18 -22 q -12 4 -22 14 Z"/>
      <!-- top roof -->
      <path d="M-110 60 L -85 30 L 85 30 L 110 60 Z"/>
      <path d="M-110 60 q -10 -4 -12 -16 q 8 2 16 10 Z"/>
      <path d="M110 60 q 10 -4 12 -16 q -8 2 -16 10 Z"/>
      <!-- finial -->
      <path d="M0 30 L -8 4 L 0 -22 L 8 4 Z"/>
      <circle cx="0" cy="-30" r="5"/>
    </g>
  </g>

  <!-- foreground banana fronds -->
  <g opacity="0.9">
    <g transform="translate(60, 700) rotate(-18)" fill="#1a4034" stroke="#0e2a22" stroke-width="1">
      <path d="M0 0 C 90 -40, 200 -90, 360 -120 C 220 -60, 110 -10, 0 0 Z"/>
      <g stroke="#0e2a22" stroke-opacity="0.6" stroke-width="1" fill="none">
        <path d="M30 -10 L 320 -110 M60 -18 L 320 -108 M90 -26 L 320 -106 M120 -34 L 320 -104 M150 -42 L 320 -102 M180 -50 L 320 -100"/>
      </g>
    </g>
    <g transform="translate(1140, 720) rotate(195)" fill="#1a4034" stroke="#0e2a22" stroke-width="1">
      <path d="M0 0 C 90 -40, 200 -90, 360 -120 C 220 -60, 110 -10, 0 0 Z"/>
      <g stroke="#0e2a22" stroke-opacity="0.6" stroke-width="1" fill="none">
        <path d="M30 -10 L 320 -110 M60 -18 L 320 -108 M90 -26 L 320 -106 M120 -34 L 320 -104 M150 -42 L 320 -102 M180 -50 L 320 -100"/>
      </g>
    </g>
  </g>

  <!-- lotus pond -->
  <ellipse cx="600" cy="700" rx="380" ry="40" fill="#0e2a22" opacity="0.55"/>

  <!-- lotus blossom (animated bloom) -->
  <g transform="translate(600, 660)">
    <g>
      <path d="M0 0 q -22 -42 0 -82 q 22 42 0 82z" fill="#f0a8b6"/>
      <path d="M0 0 q -52 -22 -56 -76 q 46 14 56 76z" fill="#e88aa0"/>
      <path d="M0 0 q 52 -22 56 -76 q -46 14 -56 76z" fill="#e88aa0"/>
      <path d="M0 0 q -78 6 -90 -42 q 64 -10 90 42z" fill="#d97a8c"/>
      <path d="M0 0 q 78 6 90 -42 q -64 -10 -90 42z" fill="#d97a8c"/>
      <circle cx="0" cy="-12" r="8" fill="#e6c068"/>
      <g stroke="#c79a3a" stroke-width="1.2" fill="none" opacity="0.85">
        <path d="M-4 -16 q 4 -6 8 0"/>
        <path d="M-6 -10 q 6 -4 12 0"/>
      </g>
    </g>
  </g>

  <!-- floating prayer-flag triangles -->
  <g transform="translate(180, 110)" opacity="0.85">
    <line x1="0" y1="0" x2="280" y2="40" stroke="#c79a3a" stroke-width="1.2"/>
    <g>
      <polygon points="20,4 36,4 28,30" fill="#c64525"/>
      <polygon points="60,10 76,10 68,36" fill="#e6c068"/>
      <polygon points="100,16 116,16 108,42" fill="#1f4d3d"/>
      <polygon points="140,22 156,22 148,48" fill="#d97a8c"/>
      <polygon points="180,28 196,28 188,54" fill="#c64525"/>
      <polygon points="220,34 236,34 228,60" fill="#e6c068"/>
    </g>
  </g>

  <!-- gold dust grain overlay -->
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.45"/>
</svg>
